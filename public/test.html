<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Invoice Tester</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, sans-serif;
      background: #f2f2f7;
      padding: 24px 16px;
      min-height: 100vh;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #1c1c1e;
    }
    p.subtitle {
      font-size: 14px;
      color: #6e6e73;
      margin-bottom: 24px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    label {
      font-size: 13px;
      font-weight: 600;
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 8px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #e5e5ea;
      border-radius: 10px;
      font-size: 14px;
      color: #1c1c1e;
      background: #f9f9f9;
    }
    .file-area {
      border: 2px dashed #c7c7cc;
      border-radius: 12px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .file-area.has-file {
      border-color: #34c759;
      background: #f0fff4;
    }
    .file-area input { display: none; }
    .file-icon { font-size: 36px; margin-bottom: 8px; }
    .file-label {
      font-size: 15px;
      font-weight: 600;
      color: #007aff;
      margin-bottom: 4px;
    }
    .file-hint {
      font-size: 13px;
      color: #8e8e93;
    }
    .file-name {
      font-size: 14px;
      color: #34c759;
      font-weight: 600;
      margin-top: 8px;
    }
    button {
      width: 100%;
      padding: 16px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .spinner {
      display: none;
      text-align: center;
      padding: 16px;
      color: #8e8e93;
      font-size: 15px;
    }
    .result {
      display: none;
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .result.success { border-left: 4px solid #34c759; }
    .result.error { border-left: 4px solid #ff3b30; }
    .result h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .field {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f2f2f7;
      font-size: 15px;
    }
    .field:last-child { border-bottom: none; }
    .field-name { color: #6e6e73; }
    .field-value { font-weight: 600; color: #1c1c1e; text-align: right; max-width: 60%; }
    .null-value { color: #c7c7cc; font-style: italic; font-weight: 400; }
    .confidence {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .high { background: #d4edda; color: #155724; }
    .medium { background: #fff3cd; color: #856404; }
    .low { background: #f8d7da; color: #721c24; }
    pre {
      font-size: 12px;
      background: #f2f2f7;
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <h1>Invoice Processor</h1>
  <p class="subtitle">Upload an invoice to extract data using AI</p>

  <div class="card">
    <label>API URL</label>
    <input type="text" id="apiUrl"
      value="https://llm-test-production.up.railway.app/api/invoices/upload" />
  </div>

  <div class="card">
    <label>Invoice File</label>
    <div class="file-area" id="fileArea" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png,.webp" onchange="handleFile(this)" />
      <div class="file-icon">📄</div>
      <div class="file-label">Tap to choose file</div>
      <div class="file-hint">PDF, JPG, PNG or WEBP · Max 10MB</div>
      <div class="file-name" id="fileName"></div>
    </div>
  </div>

  <button id="sendBtn" onclick="sendRequest()" disabled>Upload & Extract</button>

  <div class="spinner" id="spinner">⏳ Processing invoice...</div>

  <div class="result" id="result"></div>

  <script>
    function handleFile(input) {
      const file = input.files[0];
      if (!file) return;
      document.getElementById('fileName').textContent = '✓ ' + file.name;
      document.getElementById('fileArea').classList.add('has-file');
      document.getElementById('sendBtn').disabled = false;
    }

    async function sendRequest() {
      const url = document.getElementById('apiUrl').value.trim();
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];

      if (!url || !file) return;

      document.getElementById('sendBtn').disabled = true;
      document.getElementById('spinner').style.display = 'block';
      document.getElementById('result').style.display = 'none';

      try {
        const formData = new FormData();
        formData.append('invoice', file);

        const response = await fetch(url, {
          method: 'POST',
          body: formData
        });

        const data = await response.json();
        showResult(data, response.ok);

      } catch (err) {
        showError(err.message);
      } finally {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('sendBtn').disabled = false;
      }
    }

    function showResult(data, success) {
      const el = document.getElementById('result');
      el.style.display = 'block';

      if (!success || !data.success) {
        el.className = 'result error';
        el.innerHTML = `
          <h2>❌ Error</h2>
          <pre>${JSON.stringify(data, null, 2)}</pre>
        `;
        return;
      }

      const d = data.data;
      const fmt = (v) => v !== null && v !== undefined
        ? v
        : '<span class="null-value">not found</span>';

      const conf = d.confidence || 'low';

      el.className = 'result success';
      el.innerHTML = `
        <h2>✅ Extracted Successfully</h2>
        <div class="field">
          <span class="field-name">Vendor</span>
          <span class="field-value">${fmt(d.vendorName)}</span>
        </div>
        <div class="field">
          <span class="field-name">Date</span>
          <span class="field-value">${fmt(d.date)}</span>
        </div>
        <div class="field">
          <span class="field-name">Total with VAT</span>
          <span class="field-value">${d.totalWithVat !== null ? (d.currency && d.currency !== 'null' ? d.currency + ' ' : '') + d.totalWithVat : '<span class="null-value">not found</span>'}</span>
        </div>
        <div class="field">
          <span class="field-name">Total without VAT</span>
          <span class="field-value">${d.totalWithoutVat !== null ? d.currency + ' ' + d.totalWithoutVat : '<span class="null-value">not found</span>'}</span>
        </div>
        <div class="field">
          <span class="field-name">Currency</span>
          <span class="field-value">${fmt(d.currency)}</span>
        </div>
        <div class="field">
          <span class="field-name">Confidence</span>
          <span class="field-value">
            <span class="confidence ${conf}">${conf}</span>
          </span>
        </div>
      `;
    }

    function showError(msg) {
      const el = document.getElementById('result');
      el.style.display = 'block';
      el.className = 'result error';
      el.innerHTML = `<h2>❌ Network Error</h2><pre>${msg}</pre>`;
    }
  </script>

</body>
</html>
